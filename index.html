<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RouteFlow — WCC</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RouteFlow">
<meta name="theme-color" content="#2B5BA8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#2B5BA8;--navy2:#1e4080;--navy3:#3a6fc4;
  --pink:#e91e8c;--pink2:#c4177a;
  --bg:#eef2f7;--bg2:#f8f9fc;--white:#fff;
  --text:#1a1a2e;--text2:#4a5568;--text3:#718096;
  --border:#d1d9e6;--border2:#e2e8f0;
  --green:#16a34a;--red:#dc2626;--amber:#d97706;--blue:#2563eb;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

.topnav{background:var(--navy);display:flex;align-items:stretch;padding:0 12px;height:44px;flex-shrink:0}
.brand{font-size:15px;font-weight:700;color:#fff;padding:0 14px 0 4px;display:flex;align-items:center}
.brand span{color:#7dd3fc}
.nt{height:44px;padding:0 13px;display:flex;align-items:center;font-size:13px;font-weight:600;color:rgba(255,255,255,0.72);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.nt:hover{color:#fff;background:rgba(255,255,255,0.08)}
.nt.on{color:#fff;border-bottom:3px solid var(--pink)}
.tnr{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.65);background:rgba(0,0,0,0.2);padding:3px 9px;border-radius:20px}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc}
.dot.ok{background:#4ade80}.dot.busy{background:#fbbf24}.dot.err{background:#f87171}

.subnav{background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;height:37px;flex-shrink:0}
.st{height:37px;padding:0 11px;display:flex;align-items:center;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:inherit;white-space:nowrap}
.st:hover{color:var(--navy)}
.st.on{color:var(--pink);border-bottom:2px solid var(--pink)}
.snr{margin-left:auto;display:flex;align-items:center;gap:8px}
.sw{position:relative}
.si{padding:5px 10px 5px 28px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--text);background:#fff;font-family:inherit;outline:none;width:200px}
.si:focus{border-color:var(--navy)}
.sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text3);pointer-events:none}
.srd{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:var(--r);z-index:300;max-height:260px;overflow-y:auto;margin-top:3px;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.sri{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border2)}
.sri:hover{background:var(--bg2)}

.page{flex:1;overflow:hidden;display:flex;flex-direction:column}
.content{flex:1;overflow-y:auto;padding:18px}

.srow{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
.sc{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.sl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.sv{font-size:22px;font-weight:700}
.sv.nv{color:var(--navy)}.sv.gn{color:var(--green)}.sv.am{color:var(--amber)}.sv.rd{color:var(--red)}
.ss{font-size:11px;color:var(--text3);margin-top:1px}

.sumcard{background:#fff;border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.sumhdr{padding:10px 14px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px}
.sumgrid{display:grid;grid-template-columns:1fr 1fr}
.sumc{padding:13px 15px;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s}
.sumc:hover{background:var(--bg2)}
.sumc:nth-child(2n){border-right:none}
.sumc:nth-last-child(-n+2){border-bottom:none}
.sumc-l{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px}
.sumc-s{font-size:10px;color:var(--text3);margin-bottom:3px}
.sumc-v{font-size:19px;font-weight:700;color:var(--navy)}

.tc{background:#fff;border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px}
.tch{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.tct{font-size:13px;font-weight:600;flex:1}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 12px;color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg2)}
td{padding:8px 12px;border-bottom:1px solid var(--border2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:#f0f4ff}

.b{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-active{background:#dcfce7;color:#15803d}
.b-inactive{background:#f1f5f9;color:#64748b}
.b-prospect{background:#fef3c7;color:#92400e}
.b-round{background:#dbeafe;color:#1e40af;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.b-freq{background:#f0fdf4;color:#166534}
.b-bal{background:#fee2e2;color:#dc2626}
.b-due{background:#fef3c7;color:#92400e}
.b-ovd{background:#fee2e2;color:#dc2626}

.btn{padding:6px 13px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg2)}
.btn-nv{background:var(--navy);border-color:var(--navy);color:#fff}.btn-nv:hover{background:var(--navy2)}
.btn-gn{background:var(--green);border-color:var(--green);color:#fff}
.btn-rd{background:var(--red);border-color:var(--red);color:#fff;font-size:11px;padding:4px 9px}
.btn-sm{padding:4px 9px;font-size:11px}

.vp{display:flex;flex-direction:column;height:calc(100vh - 81px)}
.vp-tb{background:#fff;border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.vp-map{flex:1;position:relative}
#vpMap{width:100%;height:100%}
.vp-leg{position:absolute;top:10px;right:10px;z-index:1000;background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:10px;max-height:calc(100vh - 130px);overflow-y:auto;min-width:150px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.vp-lttl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.lr{display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer;font-size:12px}
.lr.off{opacity:.35}
.ldot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

.jw{display:flex;height:calc(100vh - 81px)}
.jl{width:400px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;background:#fff;display:flex;flex-direction:column}
.jlh{padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.jmap{flex:1;position:relative}
#jsMap{width:100%;height:100%}
.jli{padding:9px 12px;border-bottom:1px solid var(--border2);cursor:pointer}
.jli:hover{background:#f0f4ff}
.jli.sel{background:#dbeafe;border-left:3px solid var(--navy)}
.jli-n{font-size:13px;font-weight:600;margin-bottom:1px}
.jli-a{font-size:11px;color:var(--text3);margin-bottom:4px}
.jli-m{display:flex;gap:4px;flex-wrap:wrap;align-items:center}

.panel{position:fixed;right:0;top:81px;bottom:0;width:390px;background:#fff;border-left:1px solid var(--border);z-index:400;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.panel.open{transform:translateX(0)}
.ph{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2)}
.phx{background:var(--border);border:none;color:var(--text2);font-size:13px;width:24px;height:24px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pb{flex:1;overflow-y:auto;padding:14px}
.pa{padding:11px 14px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg2)}
.ps{margin-bottom:14px}
.pst{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border2)}
.dr{display:flex;padding:6px 0;border-bottom:1px solid var(--border2)}
.dr:last-child{border-bottom:none}
.dk{font-size:12px;color:var(--text3);width:95px;flex-shrink:0;font-weight:500}
.dv{font-size:12px;color:var(--text);flex:1;word-break:break-word}
.fg{margin-bottom:10px}
.fl{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.3px}
.fi{width:100%;padding:7px 9px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);background:#fff;color:var(--text);font-family:inherit;outline:none}
.fi:focus{border-color:var(--navy)}
select.fi{cursor:pointer}
textarea.fi{resize:vertical;min-height:52px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.ft{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text2);font-family:inherit;white-space:nowrap}
.ft.on{background:var(--navy);border-color:var(--navy);color:#fff}
.ft:hover:not(.on){background:var(--bg2)}
.route-stop{padding:9px 12px;border-bottom:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;gap:10px}
.route-stop:hover{background:#f0f4ff}
.route-stop.sel{background:#dbeafe;border-left:3px solid var(--navy)}
.snum{width:24px;height:24px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sinfo{flex:1;min-width:0}
.sname{font-size:13px;font-weight:600;margin-bottom:1px}
.saddr{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sprice{font-size:12px;color:var(--green);font-weight:600;flex-shrink:0}

.ldg{text-align:center;padding:48px;color:var(--text3)}
.spin{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 18px;border-radius:var(--r);font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.toast.err{background:var(--red)}
@media(max-width:768px){.srow{grid-template-columns:repeat(2,1fr)}.jl{width:100%;height:50%}.jw{flex-direction:column}.panel{width:100%}.vp-leg{display:none}}
</style>
</head>
<body>
<div class="app">
  <div class="topnav">
    <div class="brand">Route<span>Flow</span></div>
    <button class="nt on" onclick="gm('home',this)">Home</button>
    <button class="nt" onclick="gm('planner',this)">Visual Planner</button>
    <button class="nt" onclick="gm('rounds',this)">Rounds</button>
    <button class="nt" onclick="gm('jobs',this)">Jobs</button>
    <button class="nt" onclick="gm('debts',this)">Debts</button>
    <button class="nt" onclick="gm('customers',this)">Customers</button>
    <button class="nt" onclick="gm('payments',this)">Payments</button>
    <div class="tnr"><div class="pill"><span class="dot" id="sd"></span><span id="sl">Connecting...</span></div></div>
  </div>
  <div class="subnav" id="sn">
    <div class="snr">
      <div class="sw">
        <span class="sico">🔍</span>
        <input class="si" id="gs" placeholder="Search customers..." oninput="doSrch(this.value)" onblur="setTimeout(()=>hideSR(),180)">
        <div class="srd" id="sr"></div>
      </div>
    </div>
  </div>
  <div class="page" id="pw"><div class="content" id="pc"><div class="ldg"><div class="spin"></div><br>Loading RouteFlow...</div></div></div>
</div>
<div class="panel" id="dp">
  <div class="ph">
    <button class="phx" onclick="cp()">✕</button>
    <div style="flex:1"><div style="font-size:14px;font-weight:700" id="pt"></div><div style="font-size:11px;color:var(--text3)" id="ps2"></div></div>
    <div id="pst2"></div>
  </div>
  <div class="pb" id="pb"></div>
  <div class="pa" id="pa"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const SU='https://gpjvqxoxkltrtdbbuqjh.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwanZxeG94a2x0cnRkYmJ1cWpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjc4MjMsImV4cCI6MjA5MTcwMzgyM30.oUpgF1oI83ux7zd9KFhxei49zR2g1Fz6kzGG7DM8QTM';
const sb=supabase.createClient(SU,SK);
let AJ=[],AC=[],AR=[],AP=[];
let mp='home',sp=0,vpF='active',jF='active',selJ=null;
let vpMap=null,vpMk={},jsMap=null,jsMk={},hidR=new Set();
const now=new Date(),tds=now.toISOString().split('T')[0];
const yrS=tds.slice(0,4)+'-01-01',moS=tds.slice(0,7)+'-01';
const wkD=now.getDay()||7,wkS2=new Date(now);wkS2.setDate(now.getDate()-wkD+1);
const wkSs=wkS2.toISOString().split('T')[0];
const RC=['#e91e8c','#2196F3','#FF5722','#4CAF50','#9C27B0','#FF9800','#00BCD4','#F44336','#3F51B5','#8BC34A','#009688','#FFC107','#673AB7','#03A9F4','#CDDC39','#795548','#607D8B','#FF6F00','#1565C0','#2E7D32','#AD1457','#6A1B9A','#00838F','#558B2F','#4527A0','#0277BD','#E65100','#37474F','#BF360C','#1A237E','#004D40','#827717','#311B92','#01579B','#33691E','#880E4F','#4E342E'];
const CM={};
function aRC(r){r.forEach((x,i)=>{CM[x.name]=RC[i%RC.length];});}
function rc(n){return CM[n]||'#94a3b8';}
function ss(s,l){document.getElementById('sd').className='dot '+s;document.getElementById('sl').textContent=l||s;}
function toast(m,t='ok'){const e=document.getElementById('toast');e.textContent=m;e.className='toast show'+(t==='err'?' err':'');setTimeout(()=>e.className='toast',2400);}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function sa(a){if(!a)return '—';return a.split(',').slice(0,2).join(',').trim();}
function fl(f){const m={'1w':'Weekly','2w':'2-weekly','4w':'4-weekly','6w':'6-weekly','8w':'8-weekly','12w':'12-weekly','ad_hoc':'Ad hoc'};return m[f]||f||'—';}
function wv(p,f){const v=parseFloat(p)||0;const m={'1w':1,'2w':.5,'4w':.25,'6w':1/6,'8w':.125,'12w':1/12,'ad_hoc':0};return v*(m[f]||0);}
function fd(d){if(!d||d==='never')return '—';try{return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});}catch(e){return d;}}
function fds(d){if(!d)return '';try{return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});}catch(e){return d;}}
function dc(d){if(!d||d==='never')return '';if(d<tds)return 'b-ovd';if(d===tds)return 'b-due';return '';}
function fop(a){if(!a)return 'Unknown';return a.split(',')[0].trim();}
function cr2(f2,t2){const dly=AJ.filter(j=>j.status==='active').reduce((s,j)=>s+wv(j.price,j.frequency)/7,0);const f=new Date(f2),t=new Date(t2);return dly*((t-f)/864e5+1);}

async function boot(){
  ss('busy','Loading...');
  try{
    const jr=await sb.from('jobs').select('*').order('customer_name');
    if(jr.error)throw new Error('Jobs error: '+jr.error.message);
    AJ=jr.data||[];
    const[cr,rr,pr]=await Promise.all([
      sb.from('customers').select('*').order('name'),
      sb.from('rounds').select('*').order('name'),
      sb.from('payments').select('*').order('payment_date',{ascending:false})
    ]);
    AC=cr.data||[];AR=rr.data||[];AP=pr.data||[];
    aRC(AR);ss('ok',AJ.length+' jobs loaded');render();
  }catch(e){
    ss('err','Error');
    document.getElementById('pc').innerHTML='<div class="ldg"><div style="color:#dc2626;font-size:14px;margin-bottom:8px">Could not connect: '+e.message+'</div><button onclick="boot()" style="padding:8px 16px;background:#2B5BA8;color:white;border:none;border-radius:8px;cursor:pointer">Retry</button></div>';
  }
}

const SNAV={
  home:['Overview','Activity','Valuation','Income Forecast','Profit & Loss'],
  planner:[],rounds:[],jobs:['All Jobs','Active','Inactive','Prospects','Overdue'],
  debts:['Owing','Payment Risks'],customers:['All Customers'],payments:['All Payments','Record Payment']
};

function gm(page,el){
  mp=page;sp=0;
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  bSN();cp();render();
}

function bSN(){
  const tabs=SNAV[mp]||[];
  const sn=document.getElementById('sn');
  sn.querySelectorAll('.st').forEach(e=>e.remove());
  const snr=sn.querySelector('.snr');
  tabs.forEach((lbl,i)=>{
    const b=document.createElement('button');
    b.className='st'+(i===0?' on':'');
    b.textContent=lbl;
    b.onclick=()=>{sp=i;sn.querySelectorAll('.st').forEach(t=>t.classList.remove('on'));b.classList.add('on');render();};
    sn.insertBefore(b,snr);
  });
}

function render(){
  const pw=document.getElementById('pw'),pc=document.getElementById('pc');
  if(mp==='planner'||mp==='jobs'||mp==='rounds'){
    pw.style.overflow='hidden';pc.style.padding='0';pc.style.overflow='hidden';pc.style.height='100%';
    if(mp==='planner') rPlanner(pc); else if(mp==='rounds') rRounds(pc); else rJobs(pc);
  } else {
    pw.style.overflow='';pc.style.padding='18px';pc.style.overflow='';pc.style.height='';
    if(mp==='home') rHome(pc);
    else if(mp==='debts') rDebts(pc);
    else if(mp==='customers') rCusts(pc);
    else if(mp==='payments') rPays(pc);
  }
}

function rHome(c){
  if(sp===0) rOv(c);
  else if(sp===1) rAct(c);
  else if(sp===2) rVal(c);
  else if(sp===3) rFc(c);
  else rPL(c);
}

function rOv(c){
  const act=AJ.filter(j=>j.status==='active');
  const wk=act.reduce((s,j)=>s+wv(j.price,j.frequency),0);
  const mo=wk*4.33,yr=wk*52;
  const ovd=AJ.filter(j=>j.next_due&&j.next_due<tds&&j.status==='active');
  const owg=AJ.filter(j=>parseFloat(j.balance||0)>0);
  const tot=owg.reduce((s,j)=>s+(parseFloat(j.balance)||0),0);
  const yest=new Date(now);yest.setDate(now.getDate()-1);const ys=yest.toISOString().split('T')[0];
  const lws=new Date(wkS2);lws.setDate(lws.getDate()-7);const lwe=new Date(wkS2);lwe.setDate(lwe.getDate()-1);
  const lms=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().split('T')[0];
  const lme=new Date(now.getFullYear(),now.getMonth(),0).toISOString().split('T')[0];
  const lyS=(now.getFullYear()-1)+'-01-01',lySE=(now.getFullYear()-1)+tds.slice(4);
  const byOp={};
  act.forEach(j=>{const op=fop(j.assignee||j.source||'?');if(!byOp[op]){byOp[op]={c:0,m:0};}byOp[op].c++;byOp[op].m+=wv(j.price,j.frequency)*4.33;});

function initVP(){
  if(vpMap){vpMap.remove();vpMap=null;vpMk={};}

function rfVP(){
  if(!vpMap)return;
  Object.values(vpMk).forEach(m=>vpMap.removeLayer(m));vpMk={};
  let jobs=AJ.filter(j=>j.lat&&j.lng);
  if(vpF==='active')jobs=jobs.filter(j=>j.status==='active');
  else if(vpF==='overdue')jobs=jobs.filter(j=>j.next_due&&j.next_due<tds&&j.status==='active');
  else if(vpF==='today')jobs=jobs.filter(j=>j.next_due===tds);
  const bounds=[];
  jobs.forEach(j=>{
    if(hidR.has(j.round_name))return;
    const col=rc(j.round_name);
    const ic=L.divIcon({html:`<div style="width:20px;height:26px"><div style="width:20px;height:20px;border-radius:50% 50% 50% 0;background:${col};transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.35)"></div></div>`,iconSize:[20,26],iconAnchor:[10,26],className:''});
    const m=L.marker([j.lat,j.lng],{icon:ic}).addTo(vpMap);
    m.bindPopup(`<b>${j.customer_name}</b><br><span style="font-size:11px">${j.address}</span><br><b style="color:#16a34a">£${j.price}</b> · ${fl(j.frequency)}<br><span style="font-size:11px">${j.round_name||'—'} · Next: ${fd(j.next_due)}</span>`);
    m.on('click',()=>ojp(j.id));
    vpMk[j.id]=m;bounds.push([j.lat,j.lng]);
  });
  if(bounds.length>1)vpMap.fitBounds(bounds,{padding:[40,40],maxZoom:13});
}

async function doGeo(){
  const un=AJ.filter(j=>!j.lat||!j.lng);
  if(!un.length){toast('All jobs mapped!');return;}
  const btn=document.getElementById('gcBtn');if(btn)btn.disabled=true;
  toast(`Geocoding ${un.length} jobs — takes a few minutes`);
  let done=0;
  for(const j of un){
    try{
      const q=encodeURIComponent((j.address||'')+', UK');
      const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1`);
      const d=await r.json();
      if(d&&d.length){
        j.lat=parseFloat(d[0].lat);j.lng=parseFloat(d[0].lon);
        await sb.from('jobs').update({lat:j.lat,lng:j.lng}).eq('id',j.id);
        done++;rfVP();
        const mc=document.getElementById('mc');
        if(mc)mc.textContent=`${AJ.filter(x=>x.lat&&x.lng).length}/${AJ.length} mapped (${done}/${un.length})`;
      }
      await new Promise(r=>setTimeout(r,260));
    }catch(e){}
  }
  toast(`Geocoded ${done} jobs`);if(btn)btn.disabled=false;bLeg();
}

// ── POSTCODE → ROUND MAPPING (built from actual job data)
const PC_MAP={
  'DH1':'Commercial','DH6':'Bowburn/Coxhoe','DL13':'Eastgate','DL16':'Spennymoor',
  'DL17':'Ferryhill/Chilton','HG1':'Starbeck','HG2':'Pannal','HG3':'Jennifields 2',
  'HG4':'Ripon','HG5':'Knaresborough','NE8':'Deckham','NE10':'Deckham',
  'NE31':'Wardley/Hebburn','NE32':'Boldon Colliery','NE33':'Sunderland/South Shields',
  'NE34':'Sunderland/South Shields','NE35':'Boldon Colliery','NE36':'Boldon Colliery',
  'SR2':'SunderLand','SR3':'SunderLand','SR4':'SunderLand','SR5':'SunderLand',
  'SR6':'SunderLand','SR7':'Murton','YO7':'Thirsk/Millenium Green',
  'YO24':'Acomb','YO26':'York/Tockwith','YO30':'York Centre','YO31':'York Centre',
  'BD':'Commercial','LS':'Commercial','DL':'Ferryhill/Chilton','TS':'Commercial'
};

function suggestRound(postcode, lat, lng){
  if(!postcode) return null;
  const pc=postcode.trim().toUpperCase();
  // Try full outward code first (e.g. HG3)
  const m1=pc.match(/^([A-Z]{1,2}[0-9][0-9A-Z]?)/);
  if(m1 && PC_MAP[m1[1]]) return PC_MAP[m1[1]];
  // Try area only (e.g. HG)
  const m2=pc.match(/^([A-Z]{1,2})/);
  if(m2 && PC_MAP[m2[1]]) return PC_MAP[m2[1]];
  // Proximity fallback — find nearest mapped job
  if(lat && lng){
    let nearest=null, minDist=Infinity;
    AJ.filter(j=>j.lat&&j.lng&&j.round_name&&j.status==='active').forEach(j=>{
      const d=Math.sqrt(Math.pow(j.lat-lat,2)+Math.pow(j.lng-lng,2));
      if(d<minDist){minDist=d;nearest=j.round_name;}
    });
    if(nearest && minDist<0.15) return nearest; // ~10 miles
  }
  return null;
}

// ── ROUTE OPTIMISER (nearest neighbour algorithm)
function optimiseRoute(){
  const jobs=getRoundJobs().filter(j=>j.lat&&j.lng);
  if(jobs.length<2){toast('Need at least 2 mapped jobs to optimise','err');return;}
  toast('Optimising route...');

  // Nearest neighbour from first job
  const unvisited=[...jobs];
  const route=[unvisited.shift()];
  while(unvisited.length){
    const last=route[route.length-1];
    let nearest=null,minD=Infinity,idx=0;
    unvisited.forEach((j,i)=>{
      const d=haversine(last.lat,last.lng,j.lat,j.lng);
      if(d<minD){minD=d;nearest=j;idx=i;}
    });
    route.push(nearest);
    unvisited.splice(idx,1);
  }

  // Calculate total distance
  let totalKm=0;
  for(let i=0;i<route.length-1;i++) totalKm+=haversine(route[i].lat,route[i].lng,route[i+1].lat,route[i+1].lng);

  // Update sort_order in memory
  route.forEach((j,i)=>{j.sort_order=i;});
  // Add unmapped jobs at end
  const unmapped=getRoundJobs().filter(j=>!j.lat||!j.lng);
  unmapped.forEach((j,i)=>{j.sort_order=route.length+i;});

  routeOptimised=true;
  document.getElementById('roundJobList').innerHTML=buildRouteList();
  refreshRoundMap(route.concat(unmapped));
  toast(`Route optimised — ${totalKm.toFixed(1)}km total drive`);
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function resetRoute(){
  getRoundJobs().forEach(j=>delete j.sort_order);
  routeOptimised=false;
  document.getElementById('roundJobList').innerHTML=buildRouteList();
  refreshRoundMap();
  toast('Route reset');
}

async function saveRouteOrder(){
  const jobs=getRoundJobs();
  if(!jobs.length) return;
  toast('Saving route order...');
  for(const j of jobs){
    if(j.sort_order!=null){
      await sb.from('jobs').update({sort_order:j.sort_order}).eq('id',j.id);
    }
  }
  toast('Route order saved permanently');
}

bSN();boot();
</script>
</body>
</html>
